<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'Georgia', serif;
            touch-action: manipulation;
            user-select: none;
            overflow-x: hidden;
        }
        
        #table {
            background: radial-gradient(circle at 50% 50%, #0a5c27 0%, #032b10 100%);
            border: 10px solid #4a3018;
            border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) {
            #table {
                border-width: 20px;
                border-radius: 40px;
            }
        }

        .gold-text {
            color: #d4af37;
            text-shadow: 1px 1px 3px black;
        }

        /* Roulette Wheel / Result Display */
        #wheel-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid #4a3018;
            background: conic-gradient(from 0deg, #111 0% 50%, #d60000 50% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.8);
            position: relative;
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #wheel-result {
            width: 70px;
            height: 70px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            color: #1a1a1a;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Betting Board Grid */
        .board-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0;
        }

        .roulette-board {
            display: grid;
            grid-template-columns: 40px repeat(12, 1fr);
            grid-template-rows: repeat(5, 40px);
            gap: 2px;
            min-width: 600px;
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 2px;
            border: 4px solid #d4af37;
            border-radius: 4px;
        }

        @media (min-width: 768px) {
            .roulette-board {
                grid-template-columns: 50px repeat(12, 1fr);
                grid-template-rows: repeat(5, 50px);
                min-width: 800px;
            }
        }

        .spot {
            background-color: #032b10;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            position: relative;
            transition: opacity 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .spot:active { opacity: 0.7; }
        
        .spot.red { background-color: #d60000; }
        .spot.black { background-color: #111111; }
        .spot.green { background-color: #0a5c27; }

        /* Specific Grid Placements */
        .spot-0 { grid-column: 1 / 2; grid-row: 1 / 4; }
        
        /* Dozens */
        .spot-1st12 { grid-column: 2 / 6; grid-row: 4 / 5; }
        .spot-2nd12 { grid-column: 6 / 10; grid-row: 4 / 5; }
        .spot-3rd12 { grid-column: 10 / 14; grid-row: 4 / 5; }

        /* Bottom Outside Bets */
        .spot-1-18 { grid-column: 2 / 4; grid-row: 5 / 6; }
        .spot-even { grid-column: 4 / 6; grid-row: 5 / 6; }
        .spot-red-out { grid-column: 6 / 8; grid-row: 5 / 6; background-color: #d60000; }
        .spot-black-out { grid-column: 8 / 10; grid-row: 5 / 6; background-color: #111111; }
        .spot-odd { grid-column: 10 / 12; grid-row: 5 / 6; }
        .spot-19-36 { grid-column: 12 / 14; grid-row: 5 / 6; }

        /* Bet Marker (Chip placed on spot) */
        .bet-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background: repeating-radial-gradient(circle, #e0e0e0 0, #e0e0e0 2px, #333 3px, #333 4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 1px black;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            border: 2px dashed #000;
            z-index: 5;
            pointer-events: none; /* Let clicks pass to the spot */
        }

        @media (min-width: 768px) {
            .bet-marker { width: 30px; height: 30px; font-size: 12px; }
        }

        /* Chips & Controls */
        .chip {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Arial', sans-serif;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 0 0 4px rgba(255,255,255,0.2), inset 0 0 0 8px dashed rgba(0,0,0,0.3);
            transition: transform 0.1s, border 0.1s;
            text-shadow: 1px 1px 2px black;
            flex-shrink: 0;
            border: 2px solid transparent;
        }

        @media (min-width: 768px) {
            .chip { width: 60px; height: 60px; font-size: 18px; }
        }

        .chip.selected {
            transform: scale(1.15);
            border: 3px solid #d4af37;
            box-shadow: 0 0 15px #d4af37, inset 0 0 0 4px rgba(255,255,255,0.2), inset 0 0 0 8px dashed rgba(0,0,0,0.3);
        }

        .chip-1 { background-color: #e0e0e0; color: #333; text-shadow: none; box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 0 0 4px rgba(0,0,0,0.1), inset 0 0 0 8px dashed rgba(0,0,0,0.2); }
        .chip-5 { background-color: #d32f2f; }
        .chip-10 { background-color: #1976d2; }
        .chip-50 { background-color: #388e3c; }
        .chip-100 { background-color: #212121; }

        .btn {
            background: linear-gradient(to bottom, #d4af37, #aa8529);
            border: 2px solid #5c4716;
            color: #1a1a1a;
            font-weight: bold;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Arial', sans-serif;
            white-space: nowrap;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .btn:disabled { background: #555; border-color: #333; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

        .message-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #d4af37;
            padding: 15px 30px;
            border-radius: 10px;
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            width: max-content;
            max-width: 90vw;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) {
            .message-overlay { padding: 20px 40px; font-size: 28px; }
        }

        .highlight-win {
            animation: flashWin 1s infinite alternate;
        }

        @keyframes flashWin {
            0% { box-shadow: inset 0 0 20px #d4af37; border: 2px solid #d4af37; z-index: 10; }
            100% { box-shadow: inset 0 0 0px #d4af37; border: 2px solid transparent; z-index: 10; }
        }

    </style>
</head>
<body class="w-full min-h-screen flex flex-col items-center justify-center p-2 md:p-4 lg:p-8">

    <!-- Main Game Table -->
    <div id="table" class="relative w-full h-auto min-h-[700px] max-w-5xl flex flex-col p-4 md:p-6 lg:p-8 overflow-y-auto overflow-x-hidden">
        
        <div id="message-box" class="message-overlay">Place your bets!</div>

        <!-- Top Header & Wheel Area -->
        <div class="flex flex-col md:flex-row justify-between items-center w-full mb-6 z-10 gap-4">
            
            <div class="flex flex-col gap-2 w-full md:w-1/3">
                <div class="bg-black/60 px-4 py-2 rounded-xl border-2 border-yellow-700/50 gold-text text-center font-bold text-lg md:text-xl">
                    BANKROLL: $<span id="ui-bankroll">500</span>
                </div>
                <div class="bg-black/60 px-4 py-2 rounded-xl border-2 border-yellow-700/50 gold-text text-center font-bold text-lg md:text-xl">
                    TOTAL BET: $<span id="ui-bet">0</span>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center w-full md:w-1/3">
                <div id="wheel-container">
                    <div id="wheel-result">?</div>
                </div>
            </div>

            <div class="w-full md:w-1/3 text-center md:text-right hidden md:block opacity-30 pointer-events-none">
                <h1 class="text-4xl lg:text-5xl font-black uppercase tracking-widest text-yellow-500 leading-tight">Roulette</h1>
            </div>

        </div>

        <!-- Betting Board Area -->
        <div class="board-wrapper z-10 mb-6">
            <div id="betting-board" class="roulette-board">
                <!-- Zero -->
                <div class="spot green spot-0" data-bet="0">0</div>
                
                <!-- Main Numbers injected via JS to handle order (3, 6, 9... top row) -->
            </div>
        </div>

        <!-- Controls Area (Bottom) -->
        <div class="bg-black/90 rounded-xl md:rounded-2xl p-4 flex flex-col border border-yellow-900/50 z-20 shrink-0 mt-auto w-full max-w-3xl self-center shadow-[0_0_30px_rgba(0,0,0,1)]">
            
            <div class="text-center text-gray-400 text-xs mb-2 tracking-widest uppercase font-sans">Select Chip</div>
            
            <div id="chip-selector" class="flex flex-wrap justify-center items-center gap-2 md:gap-4 mb-4">
                <button class="chip chip-1 selected" data-val="1">1</button>
                <button class="chip chip-5" data-val="5">5</button>
                <button class="chip chip-10" data-val="10">10</button>
                <button class="chip chip-50" data-val="50">50</button>
                <button class="chip chip-100" data-val="100">100</button>
            </div>
            
            <div class="flex justify-center gap-2 md:gap-4 w-full">
                <button id="btn-clear" class="btn bg-gray-600 !text-white !border-gray-800 flex-1 max-w-[150px]">Clear Bets</button>
                <button id="btn-spin" class="btn text-lg px-8 flex-1 max-w-[250px] !bg-gradient-to-b !from-green-500 !to-green-700 !border-green-900 !text-white" disabled>SPIN WHEEL</button>
            </div>

        </div>
    </div>

<script>
// --- Web Audio API for Retro Sound Effects ---
let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playChipSound() {
    initAudio();
    playTone(1200, 'square', 0.05, 0.05);
    setTimeout(() => playTone(1500, 'square', 0.05, 0.05), 30);
}

function playSpinSound() {
    initAudio();
    if (!audioCtx) return;
    // Retro ticking sound for the wheel
    let ticks = 20;
    let delay = 0;
    for (let i = 0; i < ticks; i++) {
        setTimeout(() => {
            playTone(800 - (i*20), 'triangle', 0.05, 0.05);
        }, delay * 1000);
        delay += 0.05 + (i * 0.01); // gradually slow down
    }
}

function playWinSound() {
    initAudio();
    [440, 554.37, 659.25, 880].forEach((freq, i) => { 
        setTimeout(() => playTone(freq, 'sine', 0.15, 0.1), i * 150);
    });
}

function playLoseSound() {
    initAudio();
    playTone(300, 'sawtooth', 0.2, 0.1);
    setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.1), 200);
}

// --- Roulette Game Logic ---

const RED_NUMS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
let bankroll = 500;
let currentChipValue = 1;
let bets = {}; // { "bet-key": amount }
let isSpinning = false;

// DOM Elements
const uiBankroll = document.getElementById('ui-bankroll');
const uiBet = document.getElementById('ui-bet');
const msgBox = document.getElementById('message-box');
const boardContainer = document.getElementById('betting-board');
const wheelContainer = document.getElementById('wheel-container');
const wheelResult = document.getElementById('wheel-result');
const btnSpin = document.getElementById('btn-spin');
const btnClear = document.getElementById('btn-clear');
const chipButtons = document.querySelectorAll('.chip');

// Generate the board HTML
function initBoard() {
    // We already have the 0 hardcoded in the HTML to span rows properly.
    // Now we generate 1-36 in the specific grid format.
    // Grid Columns for numbers are 2 through 13. Rows are 1, 2, 3.
    // Row 1: 3, 6, 9... 36
    // Row 2: 2, 5, 8... 35
    // Row 3: 1, 4, 7... 34
    
    let html = '';
    
    // Numbers
    for (let r = 1; r <= 3; r++) {
        for (let c = 0; c < 12; c++) {
            let num = (3 - r + 1) + (c * 3);
            let color = RED_NUMS.includes(num) ? 'red' : 'black';
            html += `<div class="spot ${color}" style="grid-column: ${c+2}; grid-row: ${r};" data-bet="${num}">${num}</div>`;
        }
    }

    // Dozens
    html += `<div class="spot spot-1st12" data-bet="1st12">1st 12</div>`;
    html += `<div class="spot spot-2nd12" data-bet="2nd12">2nd 12</div>`;
    html += `<div class="spot spot-3rd12" data-bet="3rd12">3rd 12</div>`;

    // Bottom Outside
    html += `<div class="spot spot-1-18" data-bet="1-18">1 to 18</div>`;
    html += `<div class="spot spot-even" data-bet="even">EVEN</div>`;
    html += `<div class="spot spot-red-out" data-bet="red">RED</div>`;
    html += `<div class="spot spot-black-out" data-bet="black">BLACK</div>`;
    html += `<div class="spot spot-odd" data-bet="odd">ODD</div>`;
    html += `<div class="spot spot-19-36" data-bet="19-36">19 to 36</div>`;

    boardContainer.innerHTML += html;

    // Attach click listeners to all spots
    document.querySelectorAll('.spot').forEach(spot => {
        spot.addEventListener('click', handleSpotClick);
    });
}

function formatChipAmount(amt) {
    if (amt >= 1000) return (amt/1000).toFixed(1) + 'k';
    return amt;
}

function updateUI() {
    uiBankroll.innerText = bankroll;
    
    let totalBet = Object.values(bets).reduce((a, b) => a + b, 0);
    uiBet.innerText = totalBet;
    
    btnSpin.disabled = totalBet === 0 || isSpinning;
    btnClear.disabled = totalBet === 0 || isSpinning;

    // Disable chips if not affordable
    chipButtons.forEach(btn => {
        let val = parseInt(btn.dataset.val);
        btn.disabled = val > bankroll || isSpinning;
        if(btn.disabled) btn.style.opacity = '0.3';
        else btn.style.opacity = '1';
    });

    // Automatically scale down selected chip if we can't afford it
    if (currentChipValue > bankroll && bankroll > 0) {
        let affordableChips = Array.from(chipButtons).filter(b => parseInt(b.dataset.val) <= bankroll);
        if(affordableChips.length > 0) {
            selectChip(affordableChips[affordableChips.length - 1]);
        }
    }

    // Render chips on board
    document.querySelectorAll('.bet-marker').forEach(el => el.remove());
    document.querySelectorAll('.spot').forEach(spot => spot.classList.remove('highlight-win'));
    
    for (let key in bets) {
        let amt = bets[key];
        let spot = document.querySelector(`.spot[data-bet="${key}"]`);
        if (spot) {
            let marker = document.createElement('div');
            marker.className = 'bet-marker';
            marker.innerText = formatChipAmount(amt);
            
            // Determine border color based on stack size
            if(amt >= 100) marker.style.borderColor = '#ffd700'; // Gold
            else if(amt >= 50) marker.style.borderColor = '#00ff00'; // Green
            else if(amt >= 10) marker.style.borderColor = '#0000ff'; // Blue
            else if(amt >= 5) marker.style.borderColor = '#ff0000'; // Red
            else marker.style.borderColor = '#aaaaaa'; // Silver
            
            spot.appendChild(marker);
        }
    }
}

let msgTimeout;
function showMessage(msg, duration = 2000) {
    msgBox.innerHTML = msg;
    msgBox.style.opacity = 1;
    clearTimeout(msgTimeout);
    if (duration > 0) {
        msgTimeout = setTimeout(() => { msgBox.style.opacity = 0; }, duration);
    }
}

// Interactions

function selectChip(btnEl) {
    chipButtons.forEach(b => b.classList.remove('selected'));
    btnEl.classList.add('selected');
    currentChipValue = parseInt(btnEl.dataset.val);
    playChipSound();
}

chipButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        if(!isSpinning && parseInt(btn.dataset.val) <= bankroll) {
            selectChip(btn);
        }
    });
});

function handleSpotClick(e) {
    if (isSpinning) return;
    
    let spot = e.currentTarget;
    let betKey = spot.dataset.bet;
    
    if (bankroll >= currentChipValue) {
        playChipSound();
        bankroll -= currentChipValue;
        if (!bets[betKey]) bets[betKey] = 0;
        bets[betKey] += currentChipValue;
        updateUI();
    } else {
        showMessage("Not enough funds!", 1000);
    }
}

btnClear.addEventListener('click', () => {
    if (isSpinning) return;
    playChipSound();
    
    let totalRefund = Object.values(bets).reduce((a, b) => a + b, 0);
    bankroll += totalRefund;
    bets = {};
    updateUI();
});

btnSpin.addEventListener('click', () => {
    if (isSpinning || Object.keys(bets).length === 0) return;
    initAudio();
    isSpinning = true;
    updateUI();
    msgBox.style.opacity = 0;
    
    playSpinSound();
    
    // Visual Spin Effect
    let rotations = 5 * 360; // 5 full spins
    let randomAngle = Math.floor(Math.random() * 360);
    wheelContainer.style.transform = `rotate(${rotations + randomAngle}deg)`;
    
    // Simulate finding the result
    wheelResult.innerText = '';
    wheelResult.style.backgroundColor = '#e2e8f0';
    wheelResult.style.color = '#1a1a1a';

    let tickInterval = setInterval(() => {
        wheelResult.innerText = Math.floor(Math.random() * 37);
    }, 100);

    setTimeout(() => {
        clearInterval(tickInterval);
        
        // Final Result
        const winningNumber = Math.floor(Math.random() * 37);
        resolveRound(winningNumber);
        
    }, 3000); // Wait for CSS transition
});

function isWin(betKey, winningNumber) {
    if (winningNumber === 0) {
        return betKey === '0'; // Only straight up 0 wins on green
    }
    
    // Straight up
    if (betKey == winningNumber) return true;
    
    const isRedNum = RED_NUMS.includes(winningNumber);
    const isEvenNum = winningNumber % 2 === 0;

    switch(betKey) {
        case '1st12': return winningNumber >= 1 && winningNumber <= 12;
        case '2nd12': return winningNumber >= 13 && winningNumber <= 24;
        case '3rd12': return winningNumber >= 25 && winningNumber <= 36;
        case '1-18': return winningNumber >= 1 && winningNumber <= 18;
        case '19-36': return winningNumber >= 19 && winningNumber <= 36;
        case 'even': return isEvenNum;
        case 'odd': return !isEvenNum;
        case 'red': return isRedNum;
        case 'black': return !isRedNum;
    }
    return false;
}

function getPayoutMultiplier(betKey) {
    if (!isNaN(betKey)) return 36; // Straight up: pays 35:1 (returns 36x bet)
    if (['1st12', '2nd12', '3rd12'].includes(betKey)) return 3; // Dozens: pays 2:1 (returns 3x bet)
    return 2; // Even money bets (Red/Black, High/Low, Even/Odd): pays 1:1 (returns 2x bet)
}

function resolveRound(winningNumber) {
    // Style the result display
    wheelResult.innerText = winningNumber;
    if (winningNumber === 0) {
        wheelResult.style.backgroundColor = '#0a5c27';
        wheelResult.style.color = '#fff';
    } else if (RED_NUMS.includes(winningNumber)) {
        wheelResult.style.backgroundColor = '#d60000';
        wheelResult.style.color = '#fff';
    } else {
        wheelResult.style.backgroundColor = '#111111';
        wheelResult.style.color = '#fff';
    }

    // Highlight winning spot
    const winSpot = document.querySelector(`.spot[data-bet="${winningNumber}"]`);
    if (winSpot) winSpot.classList.add('highlight-win');

    let totalWon = 0;
    
    for (let key in bets) {
        if (isWin(key, winningNumber)) {
            let mult = getPayoutMultiplier(key);
            totalWon += bets[key] * mult;
            
            // Highlight outside winning spots too
            if (isNaN(key)) {
                let outSpot = document.querySelector(`.spot[data-bet="${key}"]`);
                if(outSpot) outSpot.classList.add('highlight-win');
            }
        }
    }

    if (totalWon > 0) {
        bankroll += totalWon;
        playWinSound();
        showMessage(`Winner! You won $${totalWon}`, 3000);
    } else {
        playLoseSound();
        showMessage(`No wins this round.`, 2000);
    }

    bets = {}; // Clear bets for next round
    isSpinning = false;
    
    // Reset wheel visual state so it can spin again without getting stuck at massive deg values
    setTimeout(() => {
        wheelContainer.style.transition = 'none';
        wheelContainer.style.transform = `rotate(0deg)`;
        setTimeout(() => {
            wheelContainer.style.transition = 'transform 3s cubic-bezier(0.25, 1, 0.5, 1)';
        }, 50);
        
        if(bankroll <= 0) {
             showMessage("Out of funds! Refresh page to restart.", 0);
        }
        updateUI();
    }, 3000);
}

// Startup
initBoard();
updateUI();

</script>
</body>
</html>
